<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:        #0e0a0a;
      --surface:   #1a1010;
      --border:    #3a1a1a;
      --accent:    #b02020;
      --accent2:   #d63030;
      --accent-glow: rgba(176,32,32,0.25);
      --text:      #e8d8d8;
      --muted:     #8a6060;
      --user-bg:   #2a0f0f;
      --bot-bg:    #1a1010;
      --scrollbar: #3a1a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 12px var(--accent-glow);
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
    .status-dot {
      width: 8px; height: 8px;
      background: #4caf50;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 6px #4caf5088;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* SETTINGS BAR */
    .settings-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .settings-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .settings-bar input, .settings-bar select {
      background: #100808;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .settings-bar input:focus, .settings-bar select:focus { border-color: var(--accent); }
    #api-key-input { width: 220px; font-family: monospace; }
    #system-prompt-input { flex: 1; min-width: 180px; }
    #clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-left: auto;
      transition: all 0.2s;
    }
    #clear-btn:hover { border-color: var(--accent); color: var(--accent2); }

    /* PROVIDER INFO BADGE */
    .provider-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }
    .provider-badge a { color: var(--accent2); text-decoration: none; }
    .provider-badge a:hover { text-decoration: underline; }

    /* MESSAGES */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat-window::-webkit-scrollbar { width: 6px; }
    #chat-window::-webkit-scrollbar-track { background: var(--bg); }
    #chat-window::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .user .avatar { background: var(--user-bg); border: 1px solid var(--border); }
    .bot  .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 0 10px var(--accent-glow); }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.6;
      max-width: 680px;
      word-break: break-word;
    }
    .user .bubble { background: var(--user-bg); border: 1px solid var(--border); border-top-right-radius: 4px; }
    .bot  .bubble { background: var(--bot-bg);  border: 1px solid var(--border); border-top-left-radius: 4px; }

    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 10px 0 6px; color: var(--accent2); }
    .bubble strong { color: #f0d0d0; }
    .bubble a { color: var(--accent2); }
    .bubble code:not(pre code) {
      background: #2a0f0f; padding: 2px 6px; border-radius: 4px;
      font-size: 13px; font-family: 'Consolas', monospace; color: #f08080;
    }
    .bubble pre {
      position: relative; margin: 10px 0; border-radius: 8px;
      overflow: hidden; border: 1px solid var(--border);
    }
    .bubble pre code { display: block; overflow-x: auto; padding: 14px; font-size: 13px; font-family: 'Consolas', monospace; }
    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      background: #2a0f0f; border: 1px solid var(--border); color: var(--muted);
      padding: 3px 9px; font-size: 11px; border-radius: 5px; cursor: pointer; transition: all 0.2s;
    }
    .copy-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

    .thinking .bubble {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); font-style: italic; font-size: 14px;
    }
    .dots span {
      display: inline-block; width: 5px; height: 5px;
      background: var(--muted); border-radius: 50%; margin: 0 1px;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* INPUT */
    .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: #100808; border: 1px solid var(--border);
      border-radius: 14px; padding: 10px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
    #user-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 15px; font-family: inherit;
      resize: none; max-height: 160px; min-height: 24px; line-height: 1.5;
    }
    #user-input::placeholder { color: var(--muted); }
    #send-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 8px var(--accent-glow);
    }
    #send-btn:hover { opacity: 0.85; box-shadow: 0 0 16px var(--accent-glow); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { fill: white; width: 18px; height: 18px; }
    .hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }

    /* EMPTY STATE */
    #empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 14px;
      color: var(--muted); user-select: none;
    }
    #empty-state .big-logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 32px; box-shadow: 0 0 32px var(--accent-glow);
    }
    #empty-state h2 { font-size: 22px; color: var(--text); font-weight: 600; }
    #empty-state p { font-size: 14px; text-align: center; max-width: 340px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .suggestion-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px; font-size: 13px;
      cursor: pointer; transition: all 0.2s; color: var(--text);
    }
    .suggestion-chip:hover { border-color: var(--accent); color: var(--accent2); background: var(--user-bg); }
    .key {
      background: #555;
      padding: 5px;
      border-radius: 5px;
  </style>
</head>
<body>

<header>
  <div class="logo">ðŸ¤–</div>
  <h1>AI Chat</h1>
  <a href="thingy.png"><button class="key">Key</button></a>
  <div class="status-dot" title="Ready"></div>
</header>

<div class="settings-bar">
  <label>Provider:</label>
  <select id="provider-select">
    <option value="openai">OpenAI</option>
    <option value="groq">Groq (Free)</option>
    <option value="gemini">Google Gemini (Free)</option>
    <option value="openrouter">OpenRouter</option>
    <option value="cohere">Cohere</option>
    <option value="custom">Custom (OpenAI-compatible)</option>
  </select>

  <label>Model:</label>
  <select id="model-select"></select>

  <label>API Key:</label>
  <input type="password" id="api-key-input" placeholder="Paste your API key..." autocomplete="off"/>

  <span class="provider-badge" id="provider-badge"></span>

  <label>System:</label>
  <input type="text" id="system-prompt-input" placeholder="You are a helpful assistant..." value="You are a helpful, concise, and knowledgeable AI assistant."/>

  <button id="clear-btn">Clear Chat</button>
</div>

<div id="chat-window">
  <div id="empty-state">
    <div class="big-logo">ðŸ¤–</div>
    <h2>What can I help with?</h2>
    <p>Pick a provider, paste your API key, and start chatting.</p>
    <div class="suggestions">
      <div class="suggestion-chip" onclick="fillSuggestion(this)">Explain quantum computing</div>
      <div class="suggestion-chip" onclick="fillSuggestion(this)">Write a Python web scraper</div>
      <div class="suggestion-chip" onclick="fillSuggestion(this)">Best Minecraft base designs</div>
      <div class="suggestion-chip" onclick="fillSuggestion(this)">Recommend a book like Dune</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Message AI..."></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="hint">Enter to send Â· Shift+Enter for new line Â· Your API key stays in your browser only</div>
</div>

<script>
// â”€â”€ Provider configs â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const PROVIDERS = {
  openai: {
    name: 'OpenAI',
    url: 'https://api.openai.com/v1/chat/completions',
    badge: '<a href="https://platform.openai.com/api-keys" target="_blank">Get key â†—</a> (paid)',
    models: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-3.5-turbo'],
    authHeader: (key) => `Bearer ${key}`,
    format: 'openai',
  },
  groq: {
    name: 'Groq',
    url: 'https://api.groq.com/openai/v1/chat/completions',
    badge: '<a href="https://console.groq.com/keys" target="_blank">Get free key â†—</a>',
    models: ['llama-3.3-70b-versatile', 'llama-3.1-8b-instant', 'mixtral-8x7b-32768', 'gemma2-9b-it'],
    authHeader: (key) => `Bearer ${key}`,
    format: 'openai',
  },
  gemini: {
    name: 'Google Gemini',
    url: null, // built dynamically
    badge: '<a href="https://aistudio.google.com/app/apikey" target="_blank">Get free key â†—</a>',
    models: ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-2.0-flash', 'gemini-2.0-flash-lite'],
    authHeader: null,
    format: 'gemini',
  },
  openrouter: {
    name: 'OpenRouter',
    url: 'https://openrouter.ai/api/v1/chat/completions',
    badge: '<a href="https://openrouter.ai/keys" target="_blank">Get free key â†—</a>',
    models: ['meta-llama/llama-3.3-70b-instruct:free', 'mistralai/mistral-7b-instruct:free', 'google/gemma-3-27b-it:free', 'deepseek/deepseek-r1:free'],
    authHeader: (key) => `Bearer ${key}`,
    format: 'openai',
  },
  cohere: {
    name: 'Cohere',
    url: 'https://api.cohere.com/v2/chat',
    badge: '<a href="https://dashboard.cohere.com/api-keys" target="_blank">Get free key â†—</a>',
    models: ['command-r-plus', 'command-r', 'command'],
    authHeader: (key) => `Bearer ${key}`,
    format: 'cohere',
  },
  custom: {
    name: 'Custom',
    url: null,
    badge: 'OpenAI-compatible endpoint',
    models: ['gpt-4o', 'gpt-3.5-turbo'],
    authHeader: (key) => `Bearer ${key}`,
    format: 'openai',
  },
};

// â”€â”€ State â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let messages = [];
let isStreaming = false;
let customEndpoint = '';

const chatWindow      = document.getElementById('chat-window');
const userInput       = document.getElementById('user-input');
const sendBtn         = document.getElementById('send-btn');
const emptyState      = document.getElementById('empty-state');
const apiKeyInput     = document.getElementById('api-key-input');
const modelSelect     = document.getElementById('model-select');
const providerSelect  = document.getElementById('provider-select');
const systemPromptEl  = document.getElementById('system-prompt-input');
const providerBadge   = document.getElementById('provider-badge');
const clearBtn        = document.getElementById('clear-btn');

// â”€â”€ Persist & restore settings â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function saveSettings() {
  localStorage.setItem('provider', providerSelect.value);
  localStorage.setItem('model_' + providerSelect.value, modelSelect.value);
  localStorage.setItem('key_' + providerSelect.value, apiKeyInput.value);
  localStorage.setItem('sysprompt', systemPromptEl.value);
}
function loadProvider(p) {
  const cfg = PROVIDERS[p];
  // Update models
  modelSelect.innerHTML = '';
  cfg.models.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    modelSelect.appendChild(o);
  });
  // Restore saved model
  const savedModel = localStorage.getItem('model_' + p);
  if (savedModel && cfg.models.includes(savedModel)) modelSelect.value = savedModel;
  // Restore saved key
  apiKeyInput.value = localStorage.getItem('key_' + p) || '';
  // Update badge
  providerBadge.innerHTML = cfg.badge;
  // Custom endpoint prompt
  if (p === 'custom') {
    customEndpoint = localStorage.getItem('custom_endpoint') || '';
    const ep = prompt('Enter your OpenAI-compatible endpoint URL:', customEndpoint || 'https://your-api/v1/chat/completions');
    if (ep) { customEndpoint = ep; localStorage.setItem('custom_endpoint', ep); }
  }
}

providerSelect.addEventListener('change', () => { loadProvider(providerSelect.value); saveSettings(); });
modelSelect.addEventListener('change', saveSettings);
apiKeyInput.addEventListener('change', saveSettings);
systemPromptEl.addEventListener('change', saveSettings);

// Init
const savedProvider = localStorage.getItem('provider') || 'openai';
providerSelect.value = savedProvider;
loadProvider(savedProvider);
if (localStorage.getItem('sysprompt')) systemPromptEl.value = localStorage.getItem('sysprompt');

// â”€â”€ Auto-resize textarea â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
});
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);
clearBtn.addEventListener('click', () => {
  messages = [];
  chatWindow.innerHTML = '';
  chatWindow.appendChild(emptyState);
  emptyState.style.display = 'flex';
});

function fillSuggestion(el) {
  userInput.value = el.textContent;
  userInput.dispatchEvent(new Event('input'));
  userInput.focus();
}

// â”€â”€ Markdown helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderMarkdown(text) { return marked.parse(text, { breaks: true, gfm: true }); }
function addCopyButtons(bubble) {
  bubble.querySelectorAll('pre').forEach(pre => {
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn'; btn.textContent = 'Copy';
    btn.onclick = () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.innerText : pre.innerText);
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    };
    pre.appendChild(btn);
  });
  bubble.querySelectorAll('pre code').forEach(el => { if (!el.dataset.highlighted) hljs.highlightElement(el); });
}

// â”€â”€ Message elements â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function createMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = `message ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'ðŸ‘¤' : 'ðŸ¤–';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'assistant') { bubble.innerHTML = renderMarkdown(content); addCopyButtons(bubble); }
  else bubble.textContent = content;
  msg.appendChild(avatar); msg.appendChild(bubble);
  return { el: msg, bubble };
}
function createThinking() {
  const msg = document.createElement('div');
  msg.className = 'message bot thinking';
  msg.innerHTML = `<div class="avatar">ðŸ¤–</div><div class="bubble">Thinking <div class="dots"><span></span><span></span><span></span></div></div>`;
  return msg;
}
function scrollToBottom() { chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' }); }

// â”€â”€ API call helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function callOpenAI(apiKey, model, sysPrompt, msgs, url, onChunk) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model, stream: true,
      messages: [{ role: 'system', content: sysPrompt }, ...msgs]
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
  const reader = res.body.getReader(); const decoder = new TextDecoder();
  let full = '';
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    const lines = decoder.decode(value).split('\n').filter(l => l.startsWith('data: '));
    for (const line of lines) {
      const data = line.slice(6); if (data === '[DONE]') continue;
      try { const d = JSON.parse(data); const delta = d.choices?.[0]?.delta?.content || ''; full += delta; onChunk(full); } catch {}
    }
  }
  return full;
}

async function callGemini(apiKey, model, sysPrompt, msgs) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  const contents = msgs.map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] }));
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system_instruction: { parts: [{ text: sysPrompt }] }, contents })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function callCohere(apiKey, model, sysPrompt, msgs) {
  const res = await fetch('https://api.cohere.com/v2/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model, stream: false,
      messages: [{ role: 'system', content: sysPrompt }, ...msgs]
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || `HTTP ${res.status}`); }
  const data = await res.json();
  return data.message?.content?.[0]?.text || '';
}

// â”€â”€ Main send â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isStreaming) return;
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) { alert('Please paste your API key in the settings bar above.'); apiKeyInput.focus(); return; }

  if (emptyState) emptyState.style.display = 'none';
  messages.push({ role: 'user', content: text });
  const { el: userEl } = createMessage('user', text);
  chatWindow.appendChild(userEl);
  userInput.value = ''; userInput.style.height = 'auto';
  scrollToBottom();

  const thinkingEl = createThinking();
  chatWindow.appendChild(thinkingEl);
  scrollToBottom();
  sendBtn.disabled = true; isStreaming = true;

  const provider = providerSelect.value;
  const cfg = PROVIDERS[provider];
  const model = modelSelect.value;
  const sysPrompt = systemPromptEl.value || 'You are a helpful assistant.';

  try {
    let fullText = '';

    if (cfg.format === 'gemini') {
      // Gemini: no streaming in this simple impl, show thinking then result
      fullText = await callGemini(apiKey, model, sysPrompt, messages);
      chatWindow.removeChild(thinkingEl);
      const { el: botEl, bubble } = createMessage('assistant', fullText);
      chatWindow.appendChild(botEl);
      addCopyButtons(bubble);
      scrollToBottom();

    } else if (cfg.format === 'cohere') {
      fullText = await callCohere(apiKey, model, sysPrompt, messages);
      chatWindow.removeChild(thinkingEl);
      const { el: botEl, bubble } = createMessage('assistant', fullText);
      chatWindow.appendChild(botEl);
      addCopyButtons(bubble);
      scrollToBottom();

    } else {
      // OpenAI-compatible streaming (OpenAI, Groq, OpenRouter, Custom)
      const url = provider === 'custom' ? customEndpoint : cfg.url;
      chatWindow.removeChild(thinkingEl);
      const { el: botEl, bubble } = createMessage('assistant', '');
      chatWindow.appendChild(botEl);

      fullText = await callOpenAI(apiKey, model, sysPrompt, messages, url, (partial) => {
        bubble.innerHTML = renderMarkdown(partial);
        addCopyButtons(bubble);
        scrollToBottom();
      });
    }

    messages.push({ role: 'assistant', content: fullText });

  } catch (err) {
    if (chatWindow.contains(thinkingEl)) chatWindow.removeChild(thinkingEl);
    const errEl = document.createElement('div');
    errEl.className = 'message bot';
    errEl.innerHTML = `<div class="avatar">ðŸ¤–</div><div class="bubble" style="color:#f08080;border-color:#5a1a1a;">âš ï¸ ${err.message}</div>`;
    chatWindow.appendChild(errEl);
    scrollToBottom();
  } finally {
    isStreaming = false; sendBtn.disabled = false;
  }
}
